<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Фон -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Мозг/Иконка AI -->
  <g transform="translate(256, 256)" fill="white">
    <!-- Центральная точка -->
    <circle cx="0" cy="0" r="20" fill="white"/>
    
    <!-- Синапсы -->
    <circle cx="-60" cy="-60" r="15" fill="white" opacity="0.8"/>
    <circle cx="60" cy="-60" r="15" fill="white" opacity="0.8"/>
    <circle cx="-60" cy="60" r="15" fill="white" opacity="0.8"/>
    <circle cx="60" cy="60" r="15" fill="white" opacity="0.8"/>
    
    <!-- Соединения -->
    <line x1="0" y1="0" x2="-60" y2="-60" stroke="white" stroke-width="6" opacity="0.6"/>
    <line x1="0" y1="0" x2="60" y2="-60" stroke="white" stroke-width="6" opacity="0.6"/>
    <line x1="0" y1="0" x2="-60" y2="60" stroke="white" stroke-width="6" opacity="0.6"/>
    <line x1="0" y1="0" x2="60" y2="60" stroke="white" stroke-width="6" opacity="0.6"/>
    <line x1="-60" y1="-60" x2="60" y2="-60" stroke="white" stroke-width="6" opacity="0.6"/>
    <line x1="-60" y1="60" x2="60" y2="60" stroke="white" stroke-width="6" opacity="0.6"/>
  </g>
  
  <!-- Кодовые символы -->
  <text x="100" y="140" font-family="monospace" font-size="80" fill="white" opacity="0.2">&lt;/&gt;</text>
  <text x="300" y="420" font-family="monospace" font-size="60" fill="white" opacity="0.2">{}</text>
</svg>
